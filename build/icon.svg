<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="45%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
      <feOffset dx="0" dy="14" result="shadow" />
      <feComponentTransfer in="shadow" result="shadowFaded">
        <feFuncA type="linear" slope="0.35" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadowFaded" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded squircle background -->
  <rect x="40" y="40" width="944" height="944" rx="220" ry="220" fill="url(#bg)" />

  <!-- Subtle inner highlight -->
  <rect x="40" y="40" width="944" height="520" rx="220" ry="220" fill="rgba(255,255,255,0.18)" />

  <!-- The ◧ glyph — a panel split (left half filled). Use filled rect + vertical divider to
       make it read clearly even at small sizes where the Unicode glyph gets mushy. -->
  <g filter="url(#softShadow)" transform="translate(512 512)">
    <!-- Outer frame -->
    <rect x="-280" y="-220" width="560" height="440" rx="44" ry="44"
          fill="none" stroke="url(#glyph)" stroke-width="40" />
    <!-- Left half filled -->
    <rect x="-280" y="-220" width="280" height="440" rx="44" ry="44" fill="url(#glyph)" />
    <!-- Trim the right side of the filled-left rect so it doesn't overlap the vertical divider  -->
    <rect x="-20" y="-220" width="40" height="440" fill="url(#glyph)" />
  </g>

  <!-- Halftone accent dots, top-right quadrant — a subtle callback to the storyboard UI -->
  <g opacity="0.18" fill="#0b1220">
    <circle cx="780" cy="210" r="10" />
    <circle cx="830" cy="210" r="10" />
    <circle cx="880" cy="210" r="10" />
    <circle cx="780" cy="260" r="10" />
    <circle cx="830" cy="260" r="10" />
    <circle cx="780" cy="310" r="10" />
  </g>
</svg>
