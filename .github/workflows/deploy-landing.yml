name: Deploy landing + web app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/workflows/deploy-landing.yml'
  # Let us trigger it manually from the Actions tab too.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress ones if a newer
# push comes in.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (PWA)
        env:
          VITE_STORYBOARDER_MODE: web
        run: npm run build:web

      - name: Assemble Pages payload (landing/ + app/)
        run: |
          # Single upload directory: marketing page at root, web app under
          # /app/. CNAME from landing/ provides the custom domain.
          mkdir -p _site
          cp -R landing/. _site/
          mkdir -p _site/app
          cp -R dist-web/. _site/app/

      - name: Inject Cloudflare Web Analytics token
        # Replaces the __CF_ANALYTICS_TOKEN__ placeholder in every HTML file
        # under _site/ with the repo secret. Beacon loader guards on a hex
        # regex, so if the secret is empty or missing the placeholder stays
        # and the beacon never loads (safe no-op). Set the CF_ANALYTICS_TOKEN
        # secret in repo Settings → Secrets and variables → Actions.
        env:
          CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
        run: |
          if [ -z "${CF_ANALYTICS_TOKEN}" ]; then
            echo "CF_ANALYTICS_TOKEN not set — skipping analytics injection (placeholder stays, beacon won't load)."
            exit 0
          fi
          # Reject anything that isn't a hex token so we don't deploy a broken
          # beacon config if the secret is accidentally a URL or JSON blob.
          if ! echo "${CF_ANALYTICS_TOKEN}" | grep -Eq '^[0-9a-fA-F]+$'; then
            echo "::error::CF_ANALYTICS_TOKEN must be a hex string. Got something else — check the secret."
            exit 1
          fi
          find _site -name '*.html' -print0 | xargs -0 sed -i "s/__CF_ANALYTICS_TOKEN__/${CF_ANALYTICS_TOKEN}/g"
          echo "Analytics token injected into $(find _site -name '*.html' | wc -l) HTML file(s)."

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload assembled site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
